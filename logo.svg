<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- التدرج اللوني الذهبي الفخم -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9F295" />
      <stop offset="30%" stop-color="#E0AA3E" />
      <stop offset="60%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#8a7322" />
    </linearGradient>

    <!-- تأثير الظل لإعطاء عمق للرموز والحروف -->
    <filter id="elementDepth" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#000000" flood-opacity="0.2" />
    </filter>
  </defs>

  <!-- الحروف المركزية JS -->
  <g filter="url(#elementDepth)">
    <text 
      x="250" 
      y="280" 
      font-family="Georgia, 'Times New Roman', serif" 
      font-size="240" 
      font-weight="900" 
      font-style="italic" 
      letter-spacing="-10" 
      text-anchor="middle" 
      fill="url(#goldGradient)">
      JS
    </text>
  </g>

  <!-- أيقونة حقيبة التسوق (أعلى اليمين) -->
  <g transform="translate(380, 80) scale(0.8)" filter="url(#elementDepth)">
    <path d="M10 20 H40 L45 50 H5 L10 20 Z" fill="none" stroke="url(#goldGradient)" stroke-width="3"/>
    <path d="M18 20 C18 10, 32 10, 32 20" fill="none" stroke="url(#goldGradient)" stroke-width="3"/>
  </g>

  <!-- أيقونة تجميل - مرآة أو وردة (أعلى اليسار) -->
  <g transform="translate(60, 80) scale(0.8)" filter="url(#elementDepth)">
    <circle cx="25" cy="20" r="15" fill="none" stroke="url(#goldGradient)" stroke-width="3"/>
    <path d="M25 35 L25 50 M15 50 L35 50" fill="none" stroke="url(#goldGradient)" stroke-width="3"/>
  </g>

  <!-- أيقونة منتجات أطفال - لهّاية أو فيونكة (أسفل الوسط) -->
  <g transform="translate(225, 380) scale(0.9)" filter="url(#elementDepth)">
    <circle cx="25" cy="15" r="12" fill="none" stroke="url(#goldGradient)" stroke-width="3"/>
    <path d="M13 25 Q25 45 37 25" fill="none" stroke="url(#goldGradient)" stroke-width="3"/>
    <rect x="20" y="27" width="10" height="8" rx="2" fill="url(#goldGradient)"/>
  </g>

  <!-- خط منحني يربط العناصر السفلية -->
  <path d="M 100 350 Q 250 430 400 350" stroke="url(#goldGradient)" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.6" />
</svg>
