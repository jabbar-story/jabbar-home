<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- التدرج اللوني الذهبي الفخم -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9F295" />
      <stop offset="30%" stop-color="#E0AA3E" />
      <stop offset="60%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#8a7322" />
    </linearGradient>

    <!-- تأثير ظل خفيف لإعطاء تجسيم للحروف حتى على الخلفيات الشفافة -->
    <filter id="textDepth" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- لا توجد خلفية (شفافة) -->

  <!-- الحروف JS بحجم كبير جداً ومتمركزة -->
  <g filter="url(#textDepth)">
    <text 
      x="250" 
      y="320" 
      font-family="Georgia, 'Times New Roman', serif" 
      font-size="320" 
      font-weight="900" 
      font-style="italic" 
      letter-spacing="-20" 
      text-anchor="middle" 
      fill="url(#goldGradient)">
      JS
    </text>
  </g>
  
  <!-- لمسة فنية بسيطة (خط منحني ذهبي أسفل الحروف) -->
  <path d="M 120 370 Q 250 420 380 370" stroke="url(#goldGradient)" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.8" />
</svg>
