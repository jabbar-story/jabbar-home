<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- التدرج اللوني الذهبي الفخم -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9F295" />
      <stop offset="30%" stop-color="#E0AA3E" />
      <stop offset="60%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#8a7322" />
    </linearGradient>

    <!-- تأثير الظل الناعم للحروف على الخلفية البيضاء -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#d4af37" flood-opacity="0.2" />
    </filter>
  </defs>

  <!-- الخلفية الرئيسية باللون الأبيض -->
  <rect width="500" height="500" rx="120" fill="#ffffff" />

  <!-- إطار ذهبي خارجي -->
  <rect x="30" y="30" width="440" height="440" rx="100" fill="none" stroke="url(#goldGradient)" stroke-width="8" opacity="0.8" />
  
  <!-- إطار ذهبي داخلي رفيع -->
  <rect x="50" y="50" width="400" height="400" rx="85" fill="none" stroke="url(#goldGradient)" stroke-width="2" opacity="0.4" />

  <!-- النصوص (حرفي J S) باللون الذهبي المتدرج -->
  <g filter="url(#softShadow)">
    <text 
      x="250" 
      y="330" 
      font-family="Georgia, 'Times New Roman', serif" 
      font-size="220" 
      font-weight="900" 
      font-style="italic" 
      letter-spacing="-10" 
      text-anchor="middle" 
      fill="url(#goldGradient)">
      JS
    </text>
  </g>
  
  <!-- لمسة جمالية (نقطة ذهبية) -->
  <circle cx="250" cy="380" r="6" fill="url(#goldGradient)" />
</svg>
